<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<title>MenuLens · Redesign — Print</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<style>
  @page { size: 1440px 900px; margin: 0; }
  html, body { margin:0; padding:0; background:#222; }
  body {
    font-family: 'Inter Tight', -apple-system, system-ui, sans-serif;
    color:#1F1A14;
    -webkit-font-smoothing:antialiased;
  }

  .print-doc {
    display:flex; flex-direction:column; align-items:center; gap:24px;
    padding:24px 0;
  }

  /* Each page is the natural slide size — exactly 1440x900 — and prints
     onto a single 1440x900 sheet with no scaling. */
  .print-page {
    width: 1440px;
    height: 900px;
    box-sizing: border-box;
    background: #FFF8EE;
    position: relative;
    overflow: hidden;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
    page-break-after: always;
    break-after: page;
    break-inside: avoid;
    box-shadow: 0 18px 50px rgba(0,0,0,0.35);
  }
  .print-page:last-child { page-break-after: auto; break-after: auto; }

  /* Inner page component fills the artboard. */
  .print-page > * {
    width: 100%;
    height: 100%;
  }

  @media print {
    html, body { background:#fff; }
    .print-doc { gap:0; padding:0; }
    .print-page { box-shadow:none; margin:0; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- atoms.jsx exposes ML; screen-results-friendly.jsx exposes FR + FR_TONE.
     page-cover.jsx reads all three as globals. -->
<script type="text/babel" src="atoms.jsx"></script>
<script type="text/babel" src="screen-results-friendly.jsx"></script>
<script type="text/babel" src="page-cover.jsx"></script>

<script type="text/babel">
  function PrintApp() {
    return (
      <div className="print-doc">
        <section className="print-page"><CoverPage/></section>
        <section className="print-page"><ProblemPage/></section>
        <section className="print-page"><SolutionPage/></section>
        <section className="print-page"><PersonasPage/></section>
        <section className="print-page"><DesignSystemPage/></section>
      </div>
    );
  }
  const printRoot = ReactDOM.createRoot(document.getElementById('root'));
  printRoot.render(<PrintApp/>);
</script>

<script type="text/babel">
  // Wait for fonts + render, then print.
  (async () => {
    if (document.fonts && document.fonts.ready) await document.fonts.ready;
    await new Promise(r => setTimeout(r, 800));
    window.print();
  })();
</script>
</body>
</html>
