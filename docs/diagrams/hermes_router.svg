<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 600" width="920" height="600" font-family="'Inter Tight', -apple-system, sans-serif">
  <!-- MenuLens Hermes Router architecture diagram (D11/D12).
       Friendly/Pickle Plus palette: cream #FFF8EE bg, ink #1F1A14 text,
       pickleStrong #226A3F primary edges, honeyText #7A4F11 muted, blushText #A03A2A risk. -->

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#226A3F"/>
    </marker>
    <marker id="arrow-mute" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#7A716A"/>
    </marker>
  </defs>

  <!-- Canvas bg -->
  <rect x="0" y="0" width="920" height="600" fill="#FFF8EE"/>

  <!-- Title -->
  <text x="460" y="36" fill="#1F1A14" font-size="22" font-weight="700" text-anchor="middle">
    MenuLens · Hermes Router (D11–D12)
  </text>
  <text x="460" y="56" fill="#7A716A" font-size="12" text-anchor="middle" font-family="'JetBrains Mono', monospace" letter-spacing="1.2">
    SINGLE UPLOAD · PARALLEL DISPATCH · GRACEFUL FALLBACK
  </text>

  <!-- 1. Input -->
  <g>
    <rect x="380" y="86" width="160" height="48" rx="14" fill="#FFFDF7" stroke="rgba(31,26,20,0.18)" stroke-width="1.5"/>
    <text x="460" y="110" fill="#1F1A14" font-size="14" font-weight="600" text-anchor="middle">📷 Single image upload</text>
    <text x="460" y="126" fill="#7A716A" font-size="10" text-anchor="middle" font-family="'JetBrains Mono', monospace">no mode toggle</text>
  </g>

  <!-- 2. Parallel dispatch — two columns -->
  <line x1="460" y1="134" x2="460" y2="160" stroke="#226A3F" stroke-width="2" marker-end="url(#arrow)"/>

  <g>
    <rect x="200" y="170" width="220" height="84" rx="14" fill="#E8F5EC" stroke="#226A3F" stroke-width="1.5"/>
    <text x="310" y="194" fill="#1F6E40" font-size="13" font-weight="700" text-anchor="middle">① Hermes Classifier</text>
    <text x="310" y="212" fill="#1F1A14" font-size="11" text-anchor="middle">Gemini 2.5 Flash · JSON</text>
    <text x="310" y="228" fill="#7A716A" font-size="10" font-family="'JetBrains Mono', monospace" text-anchor="middle">~700ms · in parallel</text>
    <text x="310" y="244" fill="#7A716A" font-size="10" text-anchor="middle">{kind, confidence, main_dish_ko}</text>
  </g>

  <g>
    <rect x="500" y="170" width="220" height="84" rx="14" fill="#E8F5EC" stroke="#226A3F" stroke-width="1.5"/>
    <text x="610" y="194" fill="#1F6E40" font-size="13" font-weight="700" text-anchor="middle">② Menu Reader</text>
    <text x="610" y="212" fill="#1F1A14" font-size="11" text-anchor="middle">Gemini Vision OCR + JSON</text>
    <text x="610" y="228" fill="#7A716A" font-size="10" font-family="'JetBrains Mono', monospace" text-anchor="middle">~10s · in parallel</text>
    <text x="610" y="244" fill="#7A716A" font-size="10" text-anchor="middle">items[] + warnings[]</text>
  </g>

  <!-- Parallel branch lines -->
  <path d="M 460 160 L 310 170" stroke="#226A3F" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M 460 160 L 610 170" stroke="#226A3F" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- 3. Combined verdict -->
  <g>
    <rect x="320" y="284" width="280" height="58" rx="14" fill="#FFF8EE" stroke="#1F1A14" stroke-width="2"/>
    <text x="460" y="306" fill="#1F1A14" font-size="13" font-weight="700" text-anchor="middle">Combined verdict (await both)</text>
    <text x="460" y="324" fill="#7A716A" font-size="10" font-family="'JetBrains Mono', monospace" text-anchor="middle">items≥3 → menu · 0+conf≥.85 → not_food · 1-2+strong → kind</text>
  </g>
  <line x1="310" y1="254" x2="430" y2="284" stroke="#226A3F" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="610" y1="254" x2="490" y2="284" stroke="#226A3F" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- 4. Dispatch — 4 outputs -->
  <line x1="460" y1="342" x2="460" y2="370" stroke="#226A3F" stroke-width="2"/>
  <line x1="160" y1="370" x2="760" y2="370" stroke="#226A3F" stroke-width="2"/>

  <!-- Branch 1: menu -->
  <g>
    <line x1="160" y1="370" x2="160" y2="395" stroke="#226A3F" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="40" y="400" width="240" height="100" rx="14" fill="#FFFDF7" stroke="#226A3F" stroke-width="1.5"/>
    <text x="160" y="424" fill="#1F6E40" font-size="13" font-weight="700" text-anchor="middle">menu</text>
    <text x="160" y="442" fill="#1F1A14" font-size="11" text-anchor="middle">색깔 카드 list</text>
    <text x="160" y="458" fill="#1F1A14" font-size="11" text-anchor="middle">+ NearbyRestaurants</text>
    <text x="160" y="476" fill="#7A716A" font-size="10" text-anchor="middle">+ Show staff CTA per dish</text>
    <text x="160" y="492" fill="#7A716A" font-size="10" font-family="'JetBrains Mono', monospace" text-anchor="middle">verdict.py · TTS</text>
  </g>

  <!-- Branch 2: single_dish -->
  <g>
    <line x1="380" y1="370" x2="380" y2="395" stroke="#226A3F" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="300" y="400" width="220" height="100" rx="14" fill="#FFFDF7" stroke="#226A3F" stroke-width="1.5"/>
    <text x="410" y="424" fill="#1F6E40" font-size="13" font-weight="700" text-anchor="middle">single_dish</text>
    <text x="410" y="442" fill="#1F1A14" font-size="11" text-anchor="middle">"비빔밥, 안전해요"</text>
    <text x="410" y="458" fill="#1F1A14" font-size="11" text-anchor="middle">+ Dish Finder</text>
    <text x="410" y="476" fill="#7A716A" font-size="10" text-anchor="middle">"이 음식 파는 식당 5곳"</text>
    <text x="410" y="492" fill="#7A716A" font-size="10" font-family="'JetBrains Mono', monospace" text-anchor="middle">LOD ktop:bestMenu reverse</text>
  </g>

  <!-- Branch 3: table_with_dishes -->
  <g>
    <line x1="600" y1="370" x2="600" y2="395" stroke="#7A716A" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrow-mute)"/>
    <rect x="540" y="400" width="180" height="100" rx="14" fill="#FFFDF7" stroke="#7A716A" stroke-width="1.5" stroke-dasharray="5,4"/>
    <text x="630" y="424" fill="#7A4F11" font-size="13" font-weight="700" text-anchor="middle">table_with_dishes</text>
    <text x="630" y="442" fill="#1F1A14" font-size="11" text-anchor="middle">multi-dish list</text>
    <text x="630" y="458" fill="#7A716A" font-size="10" text-anchor="middle">(falls back to menu mode</text>
    <text x="630" y="474" fill="#7A716A" font-size="10" text-anchor="middle">if no clear separation)</text>
    <text x="630" y="492" fill="#7A716A" font-size="10" font-family="'JetBrains Mono', monospace" text-anchor="middle">PHASE 2 EXPANSION</text>
  </g>

  <!-- Branch 4: not_food -->
  <g>
    <line x1="800" y1="370" x2="800" y2="395" stroke="#A03A2A" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="740" y="400" width="160" height="100" rx="14" fill="#FCE4DF" stroke="#A03A2A" stroke-width="1.5"/>
    <text x="820" y="424" fill="#A03A2A" font-size="13" font-weight="700" text-anchor="middle">not_food</text>
    <text x="820" y="442" fill="#1F1A14" font-size="11" text-anchor="middle">친화 거절</text>
    <text x="820" y="460" fill="#1F1A14" font-size="11" text-anchor="middle">"메뉴판으로 보이지 않아요"</text>
    <text x="820" y="478" fill="#7A716A" font-size="10" text-anchor="middle">no AI hallucination</text>
    <text x="820" y="492" fill="#7A716A" font-size="10" font-family="'JetBrains Mono', monospace" text-anchor="middle">SAFETY P0</text>
  </g>

  <!-- Footer notes -->
  <g>
    <line x1="40" y1="528" x2="900" y2="528" stroke="rgba(31,26,20,0.10)" stroke-width="1"/>
    <text x="40" y="552" fill="#5C5347" font-size="11">
      <tspan font-weight="600">결합 판정 (combined verdict)</tspan>: classifier는 advisory, menu_reader가 source of truth.
    </text>
    <text x="40" y="572" fill="#5C5347" font-size="11">
      Items ≥ 3 → menu (classifier 무시) ·  Items 0 + classifier confidence ≥ 0.85 → kind 채택 ·  그 외 → menu fallback (안전).
    </text>
    <text x="40" y="590" fill="#7A716A" font-size="10" font-family="'JetBrains Mono', monospace">
      ADR-015 · ADR-016 · proposal §2.2 · proposal §3.3.4 · github.com/Victor-jh/menulens · D11–D12
    </text>
  </g>
</svg>
